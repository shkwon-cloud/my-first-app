<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>꿈해몽 AI 로또 추천</title>
  <link rel="stylesheet" href="style.css">
  <!-- 구글 폰트: 감성적인 명조체 -->
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 밤하늘 별 효과를 위한 레이어 -->
  <div class="stars"></div>
  
  <div class="container">
    <header>
      <div class="logo-area">🌙</div>
      <h1>꿈해몽 AI 로또 추천</h1>
      <p class="subtitle">당신의 꿈속에 숨겨진 행운의 숫자를 찾아보세요.</p>
    </header>

    <main>
      <div class="dream-input-section">
        <label for="dream-text">어젯밤 어떤 꿈을 꾸셨나요?</label>
        <textarea id="dream-text" placeholder="예: 황금 돼지가 집으로 들어오는 꿈을 꾸었어요..."></textarea>
      </div>

      <div id="status-message" class="status-message"></div>

      <div id="ball-container" class="ball-container">
        <!-- 번호가 생성될 곳 -->
      </div>

      <button id="generate-btn" class="generate-btn">
        <span>꿈 분석하고 번호 받기</span>
      </button>
    </main>

    <footer>
      <p>&copy; 2026 꿈해몽 AI 연구소 | 당신의 꿈을 응원합니다.</p>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
